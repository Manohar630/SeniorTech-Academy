<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#002D5B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SeniorTech Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;850&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="/src/style.css?v=1">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/logo-192.png">
</head>
<body>
    <div id="app" class="mobile-container">
        <header class="app-header">
            <div class="logo">
                <span class="icon">🎓</span>
                <span class="text">SeniorTech</span>
            </div>
            <div id="header-points" class="header-points-pill">0 pts</div>
        </header>

        <main id="main-content"></main>

        <nav class="bottom-nav">
            <button id="nav-home" class="nav-item active" onclick="window.location.hash='#'">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </button>
            <button id="nav-dashboard" class="nav-item" onclick="window.location.hash='#dashboard'">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Progress</span>
            </button>
            <button id="nav-profile" class="nav-item" onclick="window.location.hash='#profile'">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </button>
        </nav>
    </div>
        <!-- Debug helper: show JS errors and localStorage (only visible when an error occurs) -->
        <div id="debug-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);color:#fff;z-index:99999;padding:20px;overflow:auto;"> 
            <button id="debug-close" style="position:fixed;right:18px;top:12px;padding:8px 12px;border-radius:8px;border:none;background:#F59E0B;color:#000;font-weight:800;">Close</button>
            <h2>App Debug</h2>
            <pre id="debug-text" style="white-space:pre-wrap;font-size:14px;"></pre>
        </div>
        <noscript style="display:block;background:#FFEFD5;padding:16px;border-radius:8px;margin:12px;max-width:480px;margin-left:auto;margin-right:auto;text-align:center;">This app requires JavaScript to run. Please enable JavaScript and reload the page.</noscript>
        <script>
            (function(){
                function showDebug(msg){
                    const el = document.getElementById('debug-text');
                    const o = document.getElementById('debug-overlay');
                    if(el && o){ el.textContent = msg; o.style.display = 'block'; }
                }
                window.addEventListener('error', function(ev){
                    try{
                        const ls = {};
                        try{ ls.store = JSON.parse(localStorage.getItem('seniortech_mastery_v2')||'null'); }catch(e){ ls.store = 'parse error'; }
                        const msg = 'Error: ' + ev.message + '\nAt: ' + (ev.filename||'') + ':' + (ev.lineno||'') + '\n\nLocalStorage:\n' + JSON.stringify(ls, null, 2) + '\n\nCheck console for stack.';
                        showDebug(msg);
                    }catch(e){ console.error(e); }
                });
                window.addEventListener('unhandledrejection', function(ev){
                    try{ showDebug('UnhandledRejection: ' + (ev.reason && ev.reason.message? ev.reason.message : String(ev.reason)) ); }catch(e){ console.error(e); }
                });
                document.addEventListener('DOMContentLoaded', function(){
                    const btn = document.getElementById('debug-close');
                    if(btn) btn.addEventListener('click', function(){ document.getElementById('debug-overlay').style.display='none'; });
                });
            })();
        </script>
        <script type="module" src="/src/main.js?v=1"></script>
</body>
</html>
